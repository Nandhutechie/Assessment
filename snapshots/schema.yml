version: 2

snapshots:
  - name: tbl_loan_chg_log_sk_data_version
    columns:
      - name: loan_key
        tests:
          - not_null

      - name: active_flag
        tests:
          - not_null
          - accepted_values:
              config:
                severity: warn
              values: ["Y", "N"]

      - name: effective_start_date
        tests:
          - not_null

      - name: effective_end_date
        tests:
          - not_null

      - name: hash_val
        tests:
          - not_null
          - unique